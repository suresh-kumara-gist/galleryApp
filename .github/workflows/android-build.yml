name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
    
    - name: List project structure
      run: |
        echo "Current directory contents:"
        ls -la
        echo ""
        echo "Looking for build.gradle files:"
        find . -name "build.gradle" -type f
        echo ""
        echo "Looking for app module:"
        if [ -d "app" ]; then
          echo "app directory found"
          ls -la app/
        else
          echo "No app directory found"
        fi
    
    - name: Create gradlew if not exists
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Creating gradlew wrapper..."
          gradle wrapper
          chmod +x gradlew
        else
          chmod +x gradlew
        fi
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      continue-on-error: true
    
    - name: List available Gradle projects
      run: ./gradlew projects
      continue-on-error: true
    
    - name: Build Debug APK (without module prefix)
      run: |
        if [ -d "app" ]; then
          ./gradlew app:assembleDebug
        else
          ./gradlew assembleDebug
        fi
      continue-on-error: false
    
    - name: Build Release APK (without module prefix)
      run: |
        if [ -d "app" ]; then
          ./gradlew app:assembleRelease
        else
          ./gradlew assembleRelease
        fi
      continue-on-error: false
    
    - name: Find and upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: GalleryApp-v1.0-debug
        path: |
          app/build/outputs/apk/debug/*.apk
          build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn
    
    - name: Find and upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: GalleryApp-v1.0-release
        path: |
          app/build/outputs/apk/release/*.apk
          build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: warn